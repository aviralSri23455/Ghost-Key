<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" rx="32" fill="#07110D"/>
  <rect x="36" y="36" width="1328" height="788" rx="28" fill="url(#bg)"/>

  <text x="86" y="110" fill="#E8FFF3" font-family="monospace" font-size="36" font-weight="700">GhostKey Architecture</text>
  <text x="86" y="148" fill="#93B7A4" font-family="monospace" font-size="18">Restricted agent on the left, GhostKey proxy in the middle, Auth0 trust layer and upstream APIs on the right.</text>

  <rect x="86" y="212" width="270" height="210" rx="24" fill="#0C1B15" stroke="#2EE58E" stroke-width="2"/>
  <text x="116" y="266" fill="#E8FFF3" font-family="monospace" font-size="28" font-weight="700">OpenClaw</text>
  <text x="116" y="300" fill="#2EE58E" font-family="monospace" font-size="18">restricted mode</text>
  <text x="116" y="346" fill="#C8DDD0" font-family="monospace" font-size="18">POST /agent/act</text>
  <text x="116" y="378" fill="#C8DDD0" font-family="monospace" font-size="18">service + action + params</text>
  <text x="116" y="410" fill="#F2C14E" font-family="monospace" font-size="18">token: NEVER_INCLUDED</text>

  <rect x="478" y="176" width="392" height="300" rx="28" fill="#10251D" stroke="#64F0C8" stroke-width="2"/>
  <text x="518" y="234" fill="#E8FFF3" font-family="monospace" font-size="30" font-weight="700">GhostKey Proxy</text>
  <text x="518" y="272" fill="#64F0C8" font-family="monospace" font-size="18">Supabase edge bridge today</text>
  <text x="518" y="312" fill="#C8DDD0" font-family="monospace" font-size="18">credential scan + policy gate</text>
  <text x="518" y="346" fill="#C8DDD0" font-family="monospace" font-size="18">getTokenFromVault(connection)</text>
  <text x="518" y="380" fill="#C8DDD0" font-family="monospace" font-size="18">inject bearer upstream</text>
  <text x="518" y="414" fill="#C8DDD0" font-family="monospace" font-size="18">strip token from response</text>
  <text x="518" y="448" fill="#F2C14E" font-family="monospace" font-size="18">audit_log + CIBA gate</text>

  <rect x="478" y="536" width="392" height="214" rx="28" fill="#111C19" stroke="#2C6553" stroke-width="2"/>
  <text x="518" y="592" fill="#E8FFF3" font-family="monospace" font-size="28" font-weight="700">Audit Trail</text>
  <text x="518" y="630" fill="#C8DDD0" font-family="monospace" font-size="18">service · action · token hash</text>
  <text x="518" y="664" fill="#C8DDD0" font-family="monospace" font-size="18">step-up outcome · revoke events</text>
  <text x="518" y="698" fill="#C8DDD0" font-family="monospace" font-size="18">user id attribution</text>

  <rect x="946" y="148" width="344" height="244" rx="28" fill="#1A1720" stroke="#F2C14E" stroke-width="2"/>
  <text x="980" y="206" fill="#FFF8E5" font-family="monospace" font-size="30" font-weight="700">Auth0</text>
  <text x="980" y="244" fill="#F2C14E" font-family="monospace" font-size="18">Token Vault + CIBA</text>
  <text x="980" y="286" fill="#EADDB3" font-family="monospace" font-size="18">stores OAuth connections</text>
  <text x="980" y="320" fill="#EADDB3" font-family="monospace" font-size="18">revokes tokens on disconnect</text>
  <text x="980" y="354" fill="#EADDB3" font-family="monospace" font-size="18">approves sensitive actions</text>

  <rect x="946" y="438" width="344" height="312" rx="28" fill="#141F22" stroke="#5EC7E8" stroke-width="2"/>
  <text x="980" y="496" fill="#E8FBFF" font-family="monospace" font-size="30" font-weight="700">Upstream APIs</text>
  <text x="980" y="542" fill="#5EC7E8" font-family="monospace" font-size="18">Gmail API</text>
  <text x="980" y="582" fill="#5EC7E8" font-family="monospace" font-size="18">Google Calendar API</text>
  <text x="980" y="622" fill="#5EC7E8" font-family="monospace" font-size="18">Slack API</text>
  <text x="980" y="674" fill="#C8E4EB" font-family="monospace" font-size="18">Bearer injected only inside GhostKey</text>

  <path d="M356 316H458" stroke="#2EE58E" stroke-width="5" stroke-linecap="round"/>
  <path d="M446 304L478 316L446 328" fill="none" stroke="#2EE58E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="364" y="292" fill="#A7E8C4" font-family="monospace" font-size="16">tool call only</text>

  <path d="M870 268H926" stroke="#F2C14E" stroke-width="5" stroke-linecap="round"/>
  <path d="M914 256L946 268L914 280" fill="none" stroke="#F2C14E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="766" y="244" fill="#F7DE8A" font-family="monospace" font-size="16">getTokenFromVault / revokeToken / CIBA</text>

  <path d="M870 570H926" stroke="#5EC7E8" stroke-width="5" stroke-linecap="round"/>
  <path d="M914 558L946 570L914 582" fill="none" stroke="#5EC7E8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="754" y="546" fill="#A8E7F7" font-family="monospace" font-size="16">Gmail / Calendar / Slack API calls</text>

  <path d="M674 476V516" stroke="#64F0C8" stroke-width="5" stroke-linecap="round"/>
  <path d="M662 504L674 536L686 504" fill="none" stroke="#64F0C8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="544" y="512" fill="#9AE9D2" font-family="monospace" font-size="16">audit + result metadata</text>

  <defs>
    <linearGradient id="bg" x1="110" y1="78" x2="1298" y2="786" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1713"/>
      <stop offset="1" stop-color="#091015"/>
    </linearGradient>
  </defs>
</svg>
